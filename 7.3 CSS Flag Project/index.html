<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    /* Write your CSS Code here */
    .flag{
      height: 600px;
      width: 900px;
      background-color: red;
      position: relative;
    }
    .flag>div{
      width: 100%;
      height: 50%;
      background-color: navy;
      position: absolute;
      top: 25%;
    }
    .flag>div>div{
      width: 200px;
      height: 200px;
      background: #fff;
      border-radius: 50%;
      position: relative;
      top: calc(25% - 25px);
      left: calc(25% + 125px);
    }
    p{
      margin: 0px;
      padding: 0px;
      color: #fff;
      text-align: center;
      font-size: 5rem;
    }
    .flag div div p{
      color: #000;
    }
  </style>
</head>

<!-- 
  IMPORTANT! Do not change any HTML
Don't add any classes/ids/elements 
Use what you know about combining selectors 
and CSS specificity instead.
Hint 1: The flag is 900px by 600px and the circle is 200px by 200px.
Hint 2: You can use CSS inspection to get the colors from
https://appbrewery.github.io/flag-of-laos/
-->

<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
